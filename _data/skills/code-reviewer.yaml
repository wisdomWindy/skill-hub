id: code-reviewer
name: Code Reviewer
category: automation
version: v1.4.2
shortDesc: Summarize diffs, surface regressions, and produce a teammate-friendly review brief.
fullDesc: |
  ## Why It Exists

  `code-reviewer` turns a messy pull request into a fast scan of risks, hotspots, and open questions.

  ## Example

  ```bash
  code-reviewer --since HEAD~5 --focus regressions
  ```
