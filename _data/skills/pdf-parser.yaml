id: pdf-parser
name: PDF Parser
category: devtools
version: v2.1.0
shortDesc: Parse PDF documents, preserve structure, and keep OCR fallbacks on standby.
fullDesc: |
  ## What It Does

  `pdf-parser` focuses on extracting structure from dense PDF files without losing headings, tables, or footnotes.

  ## Good Fits

  - Research packets
  - Vendor proposal bundles
  - Large internal reports

  ```bash
  pdf-parser ./reports/q2-review.pdf --format markdown
  ```
installCommand: curl -fsSL https://skillhub.dev/install.sh | bash -s pdf-parser@v2.1.0
usageExamples:
  - title: 基础文本提取
    code: pdf-parser ./reports/q2-review.pdf --format markdown
tags:
  - pdf
  - parsing
  - ocr
changelog: |
  - Added OCR fallback for image-only PDFs
  - Improved table recognition
status: published
installCount: 128
