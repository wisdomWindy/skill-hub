id: secret-scanner
name: Secret Scanner
category: security
version: v0.8.0
shortDesc: Scan project files for accidental credentials before publishing.
fullDesc: |
  ## What It Does

  `secret-scanner` searches static content and build output for credential-shaped strings before a release.

  ## Typical Use

  Run it before publishing a static site or sharing a public repository.

  ```bash
  secret-scanner ./dist --fail-on token
  ```
installCommand: curl -fsSL https://skillhub.dev/install.sh | bash -s secret-scanner@v0.8.0
usageExamples:
  - title: 检查构建产物
    code: secret-scanner ./dist --fail-on token
tags:
